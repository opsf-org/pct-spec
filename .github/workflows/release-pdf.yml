name: Build & Release Spec PDF

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Determine version and status
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          if [[ "${TAG}" == *-draft* ]]; then
            # e.g. v0.2-draft.1 → version=v0.2, status=draft
            VERSION="${TAG%%-draft*}"
            STATUS="draft"
            PRERELEASE="true"
            FILENAME="pct-spec-${TAG}.pdf"
            TITLE="PCT Specification ${TAG} (Draft for Public Comment)"
          else
            # e.g. v0.2 → version=v0.2, status=release
            VERSION="${TAG}"
            STATUS="release"
            PRERELEASE="false"
            FILENAME="pct-spec-${TAG}.pdf"
            TITLE="PCT Specification ${TAG}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "filename=${FILENAME}" >> "$GITHUB_OUTPUT"
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"

      - name: Install Pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            texlive-latex-recommended \
            texlive-fonts-recommended \
            texlive-latex-extra \
            texlive-fonts-extra \
            lmodern

      - name: Build PDF
        run: |
          make pdf \
            VERSION="${{ steps.meta.outputs.version }}" \
            STATUS="${{ steps.meta.outputs.status }}" \
            OUTPUT="${{ steps.meta.outputs.filename }}"

      - name: Create GitHub Release with PDF
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            "${{ steps.meta.outputs.filename }}" \
            --title "${{ steps.meta.outputs.title }}" \
            --prerelease=${{ steps.meta.outputs.prerelease }} \
            --generate-notes
