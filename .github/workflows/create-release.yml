name: Create Draft Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2-draft.3, v0.3)'
        required: true
        type: string
      branch:
        description: 'Branch to tag (draft releases must use develop)'
        required: true
        default: 'develop'
        type: string

permissions:
  contents: write

jobs:
  create-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Validate tag format
        run: |
          TAG="${{ inputs.tag }}"
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+(-(draft|rc)\.[0-9]+)?$ ]]; then
            echo "::error::Invalid tag format '${TAG}'. Expected: v0.2, v0.2-draft.3, v0.2-rc.1"
            exit 1
          fi

      - name: Validate branch for draft tags
        run: |
          TAG="${{ inputs.tag }}"
          BRANCH="${{ inputs.branch }}"
          if [[ "${TAG}" == *-draft* && "${BRANCH}" != "develop" ]]; then
            echo "::error::Draft tags must be created on the develop branch, got '${BRANCH}'"
            exit 1
          fi

      - name: Check tag does not already exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh api repos/${{ github.repository }}/git/refs/tags/${{ inputs.tag }} >/dev/null 2>&1; then
            echo "::error::Tag '${{ inputs.tag }}' already exists"
            exit 1
          fi

      - name: Get branch SHA
        id: sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(gh api repos/${{ github.repository }}/git/refs/heads/${{ inputs.branch }} --jq '.object.sha')
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "Tagging commit ${SHA} on branch ${{ inputs.branch }}"

      - name: Create tag via API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/git/refs \
            -f ref="refs/tags/${{ inputs.tag }}" \
            -f sha="${{ steps.sha.outputs.sha }}"
          echo "Created tag ${{ inputs.tag }} on ${{ steps.sha.outputs.sha }}"
